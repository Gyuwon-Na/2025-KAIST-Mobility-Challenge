mpc_path_tracker:
  ros__parameters:
    # --- 가중치 설정 (Weights) ---
    Q_pos: 20.0        # 경로 오차 가중치
    Q_heading: 28.0    # 헤딩 오차 가중치
    R_v: 0.3           # 속도 변화율 가중치
    R_w: 0.3           # 조향 변화율 가중치

    # --- 차량 제약 조건 (Constraints) ---
    max_velocity: 3.0
    max_accel: 2.0
    max_angular_vel: 2.0

    # --- 차량 물리 정보 (Vehicle Specs) ---
    wheelbase: 0.33
    vehicle_width: 0.15
    
    # --- MPC 제어 설정 ---
    horizon: 50         # 예측 구간
    dt: 0.02            # 제어 주기 (50Hz)
    lookahead_base: 0.3
    lookahead_per_speed: 0.2