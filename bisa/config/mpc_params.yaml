mpc_path_tracker:
  ros__parameters:
    # --- 가중치 설정 ---
    Q_pos: 45.0
    Q_heading: 28.0
    R_v: 0.3
    R_w: 0.3
    # --- 제약 조건 ---
    max_velocity: 2.0
    max_accel: 1.0
    max_angular_vel: 2.0
    # --- 차량 정보 ---
    wheelbase: 0.33
    vehicle_width: 0.15
    # --- MPC 설정 ---
    horizon: 100
    dt: 0.02
    lookahead_base: 0.3
    lookahead_per_speed: 0.2
