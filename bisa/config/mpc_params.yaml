mpc_path_tracker:
  ros__parameters:
    # --- MPC 설정 ---
    horizon: 64
    dt: 0.01
    lookahead_base: 0.8
    lookahead_per_speed: 0.05
    # --- 가중치 설정 ---
    Q_pos: 45.0
    Q_heading: 28.0
    R_v: 0.3
    R_w: 0.5
    # --- 제약 조건 ---
    max_velocity: 2.0
    max_accel: 1.5
    max_angular_vel: 2.5
    # --- 차량 정보 ---
    wheelbase: 0.33
    vehicle_width: 0.15
